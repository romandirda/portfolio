<!DOCTYPE html>
<head>
<html lang="en">
<meta charset="UTF-8">
<title>Bootstrap</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
<div class="gallery-title text-center">
    <h1>Beautiful Image Gallery</h1>
    <p>A collection of stunning photographs</p>
</div>
    <div class="container py-5">
    <div class="row g-4">

        <div class="col-lg-4 col-md-6">
            <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1" class="img-fluid gallery-img">
        </div>

        <div class="col-lg-4 col-md-6">
            <img src="https://images.unsplash.com/photo-1552083375-1447ce886485" class="img-fluid gallery-img">
        </div>

        <div class="col-lg-4 col-md-6">
            <img src="https://images.unsplash.com/photo-1516496636080-14fb876e029d" class="img-fluid gallery-img">
        </div>

        <div class="col-lg-4 col-md-6">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" class="img-fluid gallery-img">
        </div>

        <div class="col-lg-4 col-md-6">
            <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" class="img-fluid gallery-img">
        </div>

        <div class="col-lg-4 col-md-6">
            <img src="https://images.unsplash.com/photo-1516496636080-14fb876e029d" class="img-fluid gallery-img">
        </div>

    </div>
</div>
    <style>
        .gallery-img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
transition:0.3s;
}

.gallery-img:hover{
transform:scale(1.03);
}

</style>
</body>
</html>
